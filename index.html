<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Markdown Journal</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* === MATERIAL 3 EXPRESSIVE DARK THEME === */
        :root {
            --md-sys-color-background: #1A1C19;
            --md-sys-color-on-background: #E2E3DD;
            --md-sys-color-surface: #2A2C29; 
            --md-sys-color-on-surface: #E2E3DD;
            --md-sys-color-on-surface-variant: #C2C9BD; 
            --md-sys-color-primary: #9CD67D; 
            --md-sys-color-on-primary: #0C3900;
            --md-sys-color-primary-container: #265108;
            --md-sys-color-error: #FFB4AB; 
            --md-sys-color-error-container: #93000A;
            --md-sys-color-outline: #8C9388;
            
            --radius-large: 28px;
            --radius-medium: 16px;
            --spacing: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        h1 { text-align: center; font-size: 24px; font-weight: 700; margin: 20px 0; }

        #main-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: var(--spacing); }
        
        #memo-grid {
            flex: 1;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr; /* Default to list-like view for journals */
            gap: var(--spacing);
            align-content: start; 
            padding-bottom: 120px; 
        }

        .memo-card {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--radius-medium);
            padding: var(--spacing);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
            user-select: none;
            min-height: 140px;
        }
        .memo-card:active { transform: scale(0.98); }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .card-title { font-weight: bold; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .card-rating { background: rgba(0,0,0,0.3); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; margin-left: 8px;}
        .card-date { font-size: 12px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 8px; font-weight: 600;}
        .card-preview { font-size: 13px; color: var(--md-sys-color-on-surface); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 8px; }
        
        /* Tags */
        .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-top: auto; overflow: hidden; align-items: center;}
        .tag-chip { 
            background-color: rgba(255, 255, 255, 0.15); 
            color: var(--md-sys-color-primary); 
            font-size: 11px; 
            font-weight: 600;
            padding: 4px 10px; 
            border-radius: 12px; 
            white-space: nowrap; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1.2;
            cursor: pointer;
            border: none;
        }

        /* === BOTTOM BAR === */
        #bottom-bar {
            position: fixed;
            bottom: var(--spacing);
            left: var(--spacing);
            right: var(--spacing);
            display: flex;
            gap: 8px;
            height: 56px;
        }

        .btn { border: none; border-radius: 100px; font-weight: 600; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-primary { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); flex: 1;}
        .btn-icon { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); flex: 0 0 56px; font-size: 20px;}

        /* === MODALS === */
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--md-sys-color-background);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
            padding: var(--spacing);
        }
        .modal.active { transform: translateY(0); }
        
        .modal-content {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--radius-large);
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
            border: 1px solid var(--md-sys-color-outline);
            transition: background-color 0.3s;
        }

        .modal-header { font-size: 22px; font-weight: bold; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;}
        .viewer-subtitle { font-size: 14px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 12px; display: flex; justify-content: space-between;}
        
        #viewer-body { flex: 1; overflow-y: auto; color: var(--md-sys-color-on-surface-variant); line-height: 1.6; user-select: text; font-size: 15px;}
        #viewer-body a { color: #2196F3; text-decoration: underline; }
        #viewer-body .wiki-link { color: var(--md-sys-color-primary); cursor: pointer; font-weight: 600; }
        
        .editor-input { background: transparent; border: none; color: var(--md-sys-color-on-background); font-family: inherit; outline: none; width: 100%; }
        #edit-title { font-size: 20px; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px;}
        #edit-date { font-size: 14px; color: var(--md-sys-color-on-surface-variant); margin-bottom: 16px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);}
        #edit-content { flex: 1; resize: none; font-size: 16px; line-height: 1.5; margin-bottom: 16px; }

        /* Custom UI Elements for Journal */
        .slider-container { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; background: rgba(0,0,0,0.15); padding: 12px; border-radius: var(--radius-medium); }
        .rating-slider { flex: 1; accent-color: var(--md-sys-color-primary); cursor: pointer; }
        .rating-display { font-size: 18px; font-weight: bold; width: 30px; text-align: center; }
        
        .quick-tags-container { margin-bottom: 16px; display: flex; flex-direction: column; gap: 8px;}
        .quick-tags-label { font-size: 12px; color: var(--md-sys-color-on-surface-variant); text-transform: uppercase; font-weight: bold; }
        .quick-tags-scroll { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 4px; }
        .quick-tags-scroll::-webkit-scrollbar { display: none; }

        #search-input { font-size: 18px; padding: 12px; margin-bottom: 16px; border-bottom: 2px solid var(--md-sys-color-primary); border-radius: 8px 8px 0 0; background: rgba(255,255,255,0.05); }
        #search-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .search-item { padding: 12px; background: rgba(0,0,0,0.2); border-radius: var(--radius-medium); cursor: pointer; color: var(--md-sys-color-primary); display: flex; flex-direction: column; gap: 4px;}
        .search-item-date { font-size: 11px; color: var(--md-sys-color-on-surface-variant); }

        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 12px; }
        .text-btn { background: none; border: none; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; padding: 8px 16px; }
        
        .settings-btn { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); border: none; padding: 16px; border-radius: var(--radius-medium); font-size: 16px; font-weight: bold; margin-bottom: 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-view">
        <h1>Journal Entries</h1>
        <div id="memo-grid"></div>
        <div id="bottom-bar">
            <button class="btn btn-icon" onclick="openSettings()">&#9881;&#65039;</button>
            <button class="btn btn-icon" onclick="openSearch()">&#128269;</button>
            <button class="btn btn-primary" onclick="openEditor(null)">+ New Entry</button>
        </div>
    </div>

    <div id="viewer-modal" class="modal">
        <div class="modal-content" id="viewer-content-box">
            <div class="modal-header">
                <span id="viewer-title">Title</span>
                <span id="viewer-rating" class="card-rating" style="font-size: 16px; width: 32px; height: 32px;">10</span>
            </div>
            <div class="viewer-subtitle" id="viewer-date">Date</div>
            <div id="viewer-body"></div>
            <div class="modal-actions">
                <button class="text-btn" style="color: var(--md-sys-color-primary);" onclick="editCurrentViewer()">&#9999;&#65039; EDIT</button>
                <button class="text-btn" style="color: var(--md-sys-color-error);" onclick="closeModal('viewer-modal')">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="editor-modal" class="modal">
        <div class="modal-content" id="editor-content-box">
            <div class="modal-header" style="font-size: 18px;">Edit Journal Entry</div>
            
            <input type="datetime-local" id="edit-date" class="editor-input">
            <input type="text" id="edit-title" class="editor-input" placeholder="Entry Title or Summary...">
            
            <div class="slider-container">
                <span style="font-size: 12px; color: var(--md-sys-color-on-surface-variant);">Achievement/Rating:</span>
                <input type="range" id="edit-rating" class="rating-slider" min="0" max="10" step="1" value="5" oninput="updateEditorColor()">
                <div id="rating-display" class="rating-display">5</div>
            </div>

            <div class="quick-tags-container">
                <span class="quick-tags-label">Quick Tags</span>
                <div class="quick-tags-scroll">
                    <button class="tag-chip" onclick="insertTag('#Productive')">+ Productive</button>
                    <button class="tag-chip" onclick="insertTag('#Working')">+ Working</button>
                    <button class="tag-chip" onclick="insertTag('#Busy')">+ Busy</button>
                    <button class="tag-chip" onclick="insertTag('#Lazy')">+ Lazy</button>
                    <button class="tag-chip" onclick="insertTag('#Lethargic')">+ Lethargic</button>
                    <button class="tag-chip" onclick="insertTag('#Energetic')">+ Energetic</button>
                    <button class="tag-chip" onclick="insertTag('#Stressful')">+ Stressful</button>
                    <button class="tag-chip" onclick="insertTag('#Tired')">+ Tired</button>
                    <button class="tag-chip" onclick="insertTag('#Up')">+ Up</button>
                    <button class="tag-chip" onclick="insertTag('#Down')">+ Down</button>
                    <button class="tag-chip" onclick="insertTag('#Hot')">+ Hot</button>
                    <button class="tag-chip" onclick="insertTag('#Cold')">+ Cold</button>
                    <button class="tag-chip" onclick="insertTag('#Unwell')">+ Unwell</button>
                    <button class="tag-chip" onclick="insertTag('#Completed')">+ Completed</button>
                </div>
            </div>

            <textarea id="edit-content" class="editor-input" placeholder="Log your tasks, plans, or notes here..."></textarea>
            
            <div class="modal-actions" style="justify-content: space-between;">
                <button class="text-btn" id="delete-btn-editor" style="color: var(--md-sys-color-on-surface-variant);" onclick="promptDelete()">&#128465;&#65039; DELETE</button>
                <div>
                    <button class="text-btn" style="color: var(--md-sys-color-error);" onclick="closeModal('editor-modal')">CANCEL</button>
                    <button class="text-btn" style="color: var(--md-sys-color-primary);" onclick="saveEntry()">SAVE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="search-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Search Journal</div>
            <input type="text" id="search-input" class="editor-input" placeholder="Search title, content, tags, or dates..." onkeyup="performSearch()">
            <div id="search-results"></div>
            <div class="modal-actions">
                <button class="text-btn" style="color: var(--md-sys-color-error);" onclick="closeModal('search-modal')">CLOSE</button>
            </div>
        </div>
    </div>
    
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Settings & Data</div>
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">
                <p style="color: var(--md-sys-color-on-surface-variant); text-align: center; margin-bottom: 24px;">
                    Export your journal entries for backup or transfer.
                </p>
                <button class="settings-btn" onclick="exportData()">&#128228; Export Backup (JSON)</button>
                <button class="settings-btn" onclick="document.getElementById('import-file').click()">&#128229; Import Backup</button>
                <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
            </div>
            <div class="modal-actions">
                <button class="text-btn" style="color: var(--md-sys-color-error);" onclick="closeModal('settings-modal')">CLOSE</button>
            </div>
        </div>
    </div>

<script>
    // Storage Key updated to prevent clashing with the Notes App
    let entries = JSON.parse(localStorage.getItem('md_journal_entries')) || [];
    let currentEditId = null;
    let currentViewerId = null;

    marked.setOptions({ gfm: true, breaks: true });

    // Rating Color Mapping (0-10)
    function getColorForRating(rating) {
        const val = parseInt(rating);
        if (val === 0) return '#3D0000'; // Dark Red
        if (val <= 2) return '#4A1515';  // Red
        if (val <= 4) return '#4A2E15';  // Orange/Brown
        if (val <= 6) return '#4A4315';  // Yellowish
        if (val <= 8) return '#154A1C';  // Green
        if (val === 9) return '#15304A'; // Blue
        return '#3A154A';                // 10 = Purple
    }

    function saveToStorage() {
        // Always ensure chronological sorting (newest first) before saving
        entries.sort((a, b) => b.timestamp - a.timestamp);
        localStorage.setItem('md_journal_entries', JSON.stringify(entries));
        renderGrid();
    }

    function extractTags(text) {
        const regex = /#([a-zA-Z0-9_-]+)/g;
        const tags = new Set();
        let match;
        while ((match = regex.exec(text)) !== null) {
            tags.add(match[1]);
        }
        return Array.from(tags);
    }

    function searchForTag(tag) {
        document.getElementById('search-input').value = tag;
        document.getElementById('search-modal').classList.add('active');
        performSearch();
    }

    function renderGrid() {
        const grid = document.getElementById('memo-grid');
        grid.innerHTML = '';

        entries.forEach((entry) => {
            const dateObj = new Date(entry.timestamp);
            const dateStr = dateObj.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
            
            const tags = extractTags(entry.content);
            const tagsHtml = tags.map(t => 
                `<button class="tag-chip" onclick="searchForTag('#${escapeHtml(t)}'); event.stopPropagation();">#${escapeHtml(t)}</button>`
            ).join('');

            const card = document.createElement('div');
            card.className = 'memo-card';
            card.style.backgroundColor = getColorForRating(entry.rating);
            
            card.addEventListener('click', (e) => {
                if(!e.target.closest('.tag-chip')) openViewer(entry.id);
            });

            card.innerHTML = `
                <div class="card-header">
                    <div class="card-title">${escapeHtml(entry.title)}</div>
                    <div class="card-rating">${entry.rating}</div>
                </div>
                <div class="card-date">${dateStr}</div>
                <div class="card-preview">${escapeHtml(entry.content.replace(/#([a-zA-Z0-9_-]+)/g, ''))}</div>
                ${tags.length > 0 ? `<div class="tags-container">${tagsHtml}</div>` : ''}
            `;
            grid.appendChild(card);
        });
    }

    // --- VIEW & EDIT ---
    function openViewer(id) {
        currentViewerId = id;
        const entry = entries.find(e => e.id === id);
        if(!entry) return;

        document.getElementById('viewer-title').innerText = entry.title || 'Untitled';
        document.getElementById('viewer-rating').innerText = entry.rating;
        
        const dateObj = new Date(entry.timestamp);
        document.getElementById('viewer-date').innerText = dateObj.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        const viewerBox = document.getElementById('viewer-content-box');
        viewerBox.style.backgroundColor = getColorForRating(entry.rating);

        let rawContent = entry.content;
        rawContent = rawContent.replace(/\[\[(.*?)\]\]/g, (match, target) => {
            return `<span class="wiki-link" onclick="handleWikiLink('${target}')">${target}</span>`;
        });
        
        const viewerBody = document.getElementById('viewer-body');
        viewerBody.innerHTML = marked.parse(rawContent);

        document.getElementById('viewer-modal').classList.add('active');
    }

    // Local ISO formatting for the datetime-local input
    function toLocalISOString(date) {
        const tzoffset = (date).getTimezoneOffset() * 60000;
        return (new Date(date - tzoffset)).toISOString().slice(0, 16);
    }

    function openEditor(id) {
        currentEditId = id;
        const titleInput = document.getElementById('edit-title');
        const contentInput = document.getElementById('edit-content');
        const dateInput = document.getElementById('edit-date');
        const ratingInput = document.getElementById('edit-rating');
        const delBtn = document.getElementById('delete-btn-editor');

        if (id) {
            const entry = entries.find(e => e.id === id);
            titleInput.value = entry.title;
            contentInput.value = entry.content;
            dateInput.value = toLocalISOString(new Date(entry.timestamp));
            ratingInput.value = entry.rating;
            delBtn.style.display = 'block';
        } else {
            titleInput.value = '';
            contentInput.value = '';
            dateInput.value = toLocalISOString(new Date()); // Defaults to current date/time
            ratingInput.value = 5;
            delBtn.style.display = 'none';
        }
        
        updateEditorColor();
        document.getElementById('editor-modal').classList.add('active');
    }

    function updateEditorColor() {
        const rating = document.getElementById('edit-rating').value;
        document.getElementById('rating-display').innerText = rating;
        document.getElementById('editor-content-box').style.backgroundColor = getColorForRating(rating);
    }

    function insertTag(tag) {
        const textarea = document.getElementById('edit-content');
        const startPos = textarea.selectionStart;
        const endPos = textarea.selectionEnd;
        const currentVal = textarea.value;
        
        // Add space if there isn't one before the cursor
        const padStr = (startPos > 0 && currentVal.charAt(startPos - 1) !== ' ' && currentVal.charAt(startPos - 1) !== '\n') ? ' ' : '';
        const insertion = padStr + tag + ' ';
        
        textarea.value = currentVal.substring(0, startPos) + insertion + currentVal.substring(endPos);
        textarea.selectionStart = textarea.selectionEnd = startPos + insertion.length;
        textarea.focus();
    }

    function editCurrentViewer() {
        closeModal('viewer-modal');
        openEditor(currentViewerId);
    }

    function saveEntry() {
        const title = document.getElementById('edit-title').value.trim() || 'Untitled';
        const content = document.getElementById('edit-content').value;
        const rating = parseInt(document.getElementById('edit-rating').value);
        
        // Convert datetime input back to timestamp, fallback to Date.now() if invalid
        const dateVal = document.getElementById('edit-date').value;
        const timestamp = dateVal ? new Date(dateVal).getTime() : Date.now();

        if (currentEditId) {
            const index = entries.findIndex(e => e.id === currentEditId);
            entries[index] = { ...entries[index], title, content, rating, timestamp };
        } else {
            entries.push({ id: 'j_' + Date.now(), title, content, rating, timestamp });
        }

        saveToStorage();
        closeModal('editor-modal');
    }

    function promptDelete() {
        if(confirm("Are you sure you want to delete this journal entry?")) {
            entries = entries.filter(e => e.id !== currentEditId);
            saveToStorage();
            closeModal('editor-modal');
            closeModal('viewer-modal');
        }
    }

    function handleWikiLink(targetTitle) {
        closeModal('viewer-modal');
        closeModal('search-modal');
        
        if (targetTitle.startsWith('#')) {
            searchForTag(targetTitle);
            return;
        }

        const existing = entries.find(e => e.title.toLowerCase() === targetTitle.toLowerCase());
        if (existing) { openViewer(existing.id); } 
        else {
            openEditor(null);
            document.getElementById('edit-title').value = targetTitle;
        }
    }

    // --- SEARCH ---
    function openSearch() {
        document.getElementById('search-input').value = '';
        document.getElementById('search-results').innerHTML = '';
        document.getElementById('search-modal').classList.add('active');
        setTimeout(() => document.getElementById('search-input').focus(), 300);
    }

    function performSearch() {
        const query = document.getElementById('search-input').value.toLowerCase().trim();
        const resultsContainer = document.getElementById('search-results');
        resultsContainer.innerHTML = '';
        if (!query) return;

        const results = entries.filter(e => {
            const dateStr = new Date(e.timestamp).toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }).toLowerCase();
            return e.title.toLowerCase().includes(query) || 
                   e.content.toLowerCase().includes(query) || 
                   dateStr.includes(query);
        });

        if (results.length === 0) {
            resultsContainer.innerHTML = '<div style="padding: 12px; color: gray;">No matches found.</div>';
            return;
        }

        results.forEach(e => {
            const dateObj = new Date(e.timestamp);
            const dateStr = dateObj.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            
            const el = document.createElement('div');
            el.className = 'search-item';
            el.innerHTML = `
                <div style="font-weight: bold;">&#128214; ${escapeHtml(e.title)} <span style="float: right;">${e.rating}/10</span></div>
                <div class="search-item-date">${dateStr}</div>
            `;
            el.onclick = () => { closeModal('search-modal'); openViewer(e.id); };
            resultsContainer.appendChild(el);
        });
    }

    // --- BACKUP & SYNC ---
    function openSettings() {
        document.getElementById('settings-modal').classList.add('active');
    }
    
    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(entries));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "journal_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedEntries = JSON.parse(e.target.result);
                if(Array.isArray(importedEntries)) {
                    entries = importedEntries;
                    saveToStorage();
                    closeModal('settings-modal');
                    alert("Journal backup imported successfully!");
                } else {
                    alert("Invalid backup file structure.");
                }
            } catch (err) {
                alert("Error reading file: " + err.message);
            }
        };
        reader.readAsText(file);
        event.target.value = ''; 
    }

    // --- UTILS ---
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    function escapeHtml(text) { return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }

    renderGrid();
</script>
</body>
</html>
